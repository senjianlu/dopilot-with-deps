name: docker

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      dopilot_base_image:
        description: "Base dopilot image to extend"
        required: false
        default: "rabbir/dopilot:latest"
      image_tag:
        description: "Extra tag for the custom image"
        required: false
        default: "manual"
      install_playwright_browsers:
        description: "Install Chromium and OS dependencies via playwright install --with-deps"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  repository_dispatch:
    types:
      - dopilot-image-built

env:
  # Replace this if you publish to a different Docker Hub namespace/repository.
  DOCKER_IMAGE: rabbir/dopilot-with-deps
  # Replace this if the upstream dopilot image moves.
  DOPILOT_BASE_IMAGE_DEFAULT: rabbir/dopilot:latest
  DOCKER_PLATFORMS: linux/amd64

jobs:
  build:
    name: Build and push custom dopilot image
    runs-on: ubuntu-latest
    concurrency:
      group: dopilot-with-deps-${{ github.event_name }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image inputs
        id: image
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "repository_dispatch" ]]; then
            base_image="${{ github.event.client_payload.dopilot_base_image }}"
            dopilot_sha="${{ github.event.client_payload.dopilot_sha }}"
            if [[ -z "${base_image}" || -z "${dopilot_sha}" ]]; then
              echo "repository_dispatch payload must include dopilot_base_image and dopilot_sha" >&2
              exit 1
            fi
            custom_tag="${dopilot_sha:0:12}"
            install_playwright_browsers="${{ github.event.client_payload.install_playwright_browsers || 'false' }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            base_image="${{ inputs.dopilot_base_image }}"
            custom_tag="${{ inputs.image_tag }}"
            install_playwright_browsers="${{ inputs.install_playwright_browsers }}"
          else
            base_image="${DOPILOT_BASE_IMAGE_DEFAULT}"
            custom_tag="${GITHUB_SHA::12}"
            install_playwright_browsers="false"
          fi

          if [[ "${custom_tag}" == "manual" || -z "${custom_tag}" ]]; then
            custom_tag="manual-$(date -u +%Y%m%d%H%M%S)"
          fi

          {
            echo "base_image=${base_image}"
            echo "custom_tag=${custom_tag}"
            echo "install_playwright_browsers=${install_playwright_browsers}"
          } >> "${GITHUB_OUTPUT}"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          build-args: |
            DOPILOT_BASE_IMAGE=${{ steps.image.outputs.base_image }}
            INSTALL_PLAYWRIGHT_BROWSERS=${{ steps.image.outputs.install_playwright_browsers }}
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.image.outputs.custom_tag }}
            ${{ env.DOCKER_IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.base.name=${{ steps.image.outputs.base_image }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=dopilot-with-deps
          cache-to: type=gha,mode=max,scope=dopilot-with-deps
